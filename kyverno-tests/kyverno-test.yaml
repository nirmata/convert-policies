# Kyverno CLI test for the converted policy (output/converted.yaml).
# When you run validate.py, it auto-patches results.policy to match the converted policy's metadata.name
# (so it works whether nctl produces require-pod-resource-limits, require-cpu-memory-limits, etc.).
# See: https://kyverno.io/docs/kyverno-cli/usage/test/
apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-resource-limits-test
policies:
  - ../output/converted.yaml
resources:
  - resources.yaml
results:
  - policy: require-cpu-memory-limits
    rule: ""
    resources:
      - pod-with-limits
    kind: Pod
    result: pass
  - policy: require-cpu-memory-limits
    rule: ""
    resources:
      - pod-without-limits
    kind: Pod
    result: fail
