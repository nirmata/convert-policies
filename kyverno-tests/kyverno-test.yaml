# Kyverno CLI test for the converted policy (output/converted.yaml).
# The converted policy should have metadata.name: require-resource-limits for this test to match.
# See: https://kyverno.io/docs/kyverno-cli/usage/test/
apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-resource-limits-test
policies:
  - ../output/converted.yaml
resources:
  - resources.yaml
results:
  - policy: require-resource-limits
    rule: check-resource-limits
    resource: pod-with-limits
    kind: Pod
    result: pass
  - policy: require-resource-limits
    rule: check-resource-limits
    resource: pod-without-limits
    kind: Pod
    result: fail
