apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: default
spec:
  containers:
    - name: app
      image: nginx:latest
      resources:
        limits:
          memory: "128Mi"
          cpu: "100m"
        requests:
          memory: "64Mi"
          cpu: "50m"
      securityContext:
        runAsNonRoot: true
        privileged: false
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
